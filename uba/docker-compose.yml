# UBA Stack - Base Configuration
# Infrastructure: Kafka (KRaft mode), Schema Registry
# Application: uba-backend (GHCR image)
# Admin UIs (kafka-ui) are added only in staging overlay.

services:
  kafka:
    image: confluentinc/cp-kafka:7.8.7
    container_name: uba_kafka
    hostname: uba_kafka
    restart: unless-stopped
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      # KRaft mode (no ZooKeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@uba_kafka:9093'
      # Listeners
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://uba_kafka:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      # Cluster ID (unique per cluster, required for KRaft)
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-EmptNWtoR4GGWx-BH6nGLQ}
      # Single-node VPS resource optimization
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS:--Xmx512m -Xms512m}
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - anyone_network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.8.7
    container_name: uba_schema_registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'uba_kafka:9092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "127.0.0.1:8081:8081"
    networks:
      - anyone_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  uba-backend:
    image: ghcr.io/anyone-project/uba-backend:${IMAGE_TAG:-staging}
    container_name: uba_backend
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: uba_kafka:9092
      SCHEMA_REGISTRY_URL: http://uba_schema_registry:8081
    ports:
      - "127.0.0.1:${UBA_BACKEND_PORT:-8001}:8001"
    networks:
      - anyone_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  kafka_data:

networks:
  anyone_network:
    external: true
