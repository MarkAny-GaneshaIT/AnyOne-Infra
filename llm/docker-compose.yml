version: '3.8'

services:
  neo4j:
    image: neo4j:5.26-community-ubi9
    container_name: llm_neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_DEPRECATION_WARNING=suppress
      
      # Beritahu Neo4j kalau alamat publiknya adalah HTTPS (Port 443)
      - NEO4J_server_http_advertised__address=neo4j.anyone.ganeshait.com:443
      
      # Alamat Bolt tetap di port 7687
      - NEO4J_server_bolt_advertised__address=neo4j.anyone.ganeshait.com:7687
      
      # Matikan TLS internal karena kita pakai Nginx
      - NEO4J_server_bolt_tls__level=DISABLED
    ports:
      - "7474:7474" # HTTP Browser (Akses web UI Neo4j)
      - "127.0.0.1:7688:7687" # Bolt port (Untuk koneksi dari aplikasi LLM nanti)
    volumes:
      - neo4j_data:/data
    networks:
      - anyone_network

volumes:
  neo4j_data:

networks:
  anyone_network:
    external: true