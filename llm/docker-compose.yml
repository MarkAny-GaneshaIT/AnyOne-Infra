# LLM Stack - Base Configuration
# Infrastructure: Neo4j (graph DB), Redis (cache/broker)
# Applications: llm-backend, llm-frontend (GHCR images)
# Admin UIs (redis-insight) are added only in staging overlay.

services:
  neo4j:
    image: neo4j:5.26.22-community-trixie
    container_name: llm_neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7688:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
      - neo4j_plugins:/plugins
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_DEPRECATION_WARNING: suppress
      NEO4J_server_bolt_tls__level: DISABLED
      # APOC plugin
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_config_strict__validation_enabled: "false"
      # Memory (overridden in prod overlay for higher values)
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    networks:
      - anyone_network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 300s

  redis:
    image: redis:8.6-trixie
    container_name: llm_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - anyone_network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep -q PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  llm-backend:
    image: ghcr.io/anyone-project/llm-backend:${IMAGE_TAG:-staging}
    container_name: llm_backend
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://llm_neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@llm_redis:6379
    ports:
      - "127.0.0.1:${LLM_BACKEND_PORT:-8002}:8002"
    networks:
      - anyone_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  llm-frontend:
    image: ghcr.io/anyone-project/llm-frontend:${IMAGE_TAG:-staging}
    container_name: llm_frontend
    restart: unless-stopped
    depends_on:
      llm-backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${LLM_FRONTEND_PORT:-3000}:3000"
    networks:
      - anyone_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  redis_data:

networks:
  anyone_network:
    external: true
