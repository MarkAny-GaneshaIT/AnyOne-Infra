# EDR Stack - Base Configuration
# Infrastructure: PostgreSQL
# Application: edr-backend (GHCR image)
# Admin UIs (pgAdmin) are added only in staging overlay.

services:
  postgres:
    image: postgres:18-trixie
    container_name: edr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - anyone_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  edr-backend:
    image: ghcr.io/anyone-project/edr-backend:${IMAGE_TAG:-staging}
    container_name: edr_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@edr_postgres:5432/${POSTGRES_DB}
    ports:
      - "127.0.0.1:${EDR_BACKEND_PORT:-8000}:8000"
    networks:
      - anyone_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:

networks:
  anyone_network:
    external: true
